name: Generate GitHub Stats (Ocean Theme)

on:
  schedule:
    # 每天凌晨 0点自动运行
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 注意：这里需要你在仓库 Secret 中配置 PAT_TOKEN
          token: ${{ secrets.PAT_TOKEN }}

      # 2. 生成基础统计卡片 (Stats Card)
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # 配置说明：主题为 ocean，背景透明，显示图标，隐藏边框
          options: username=${{ github.repository_owner }}&theme=ocean&bg_color=00000000&show_icons=true&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      # 3. 生成常用语言卡片 (Top Languages Card)
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          # 配置说明：主题为 ocean，背景透明，紧凑布局
          options: username=${{ github.repository_owner }}&theme=ocean&bg_color=00000000&layout=compact&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 4. 提交并推送生成的图片到仓库
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          # 如果图片没有变化，则跳过 commit 防止报错
          git commit -m "chore: Update GitHub Stats (Ocean Theme)" || exit 0
          git push
