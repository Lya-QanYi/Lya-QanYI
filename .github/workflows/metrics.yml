name: Metrics & Stats

on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ──────────────────────────────────────────
      # lowlighter/metrics 部分
      # ──────────────────────────────────────────

      # 1. 语言深度分析（含贡献到他人仓库的 commit）
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: "html, css"
          plugin_languages_indepth: yes
          commits_authoring: ${{ github.repository_owner }}
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8
          repositories_forks: yes
          plugin_languages_analysis_timeout: 30

      # 2. 互动表情
      # - name: Reactions
      #  uses: lowlighter/metrics@latest
      #  with:
      #    filename: metrics.reactions.svg
      #    token: ${{ secrets.METRICS_TOKEN }}
      #    base: ""
      #    plugin_reactions: yes
      #    plugin_reactions_limit: 100

      # 3. Issue/PR 跟进 (All-time, 包含归档)
      - name: Followup
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.followup.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_followup: yes
          plugin_followup_indepth: yes
          plugin_followup_archived: yes
          plugin_followup_sections: user

      # 4. 置顶仓库
      - name: Pinned Repositories
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.repositories.pinned.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 6

      # 5. WakaTime（需配置 WAKATIME_TOKEN）
      # - name: WakaTime
      #   uses: lowlighter/metrics@latest
      #   with:
      #     filename: metrics.wakatime.svg
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     base: ""
      #     plugin_wakatime: yes
      #     plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
      #     plugin_wakatime_days: 7

      # 6. 获得的 Star
      - name: Stars
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.stars.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 3

      # 7. 3D 提交日历
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.isocalendar.fullyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # 8. 全年普通日历
      - name: Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.calendar.full.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_calendar: yes
          plugin_calendar_limit: 2

      # ──────────────────────────────────────────
      # github-readme-stats 部分
      # ──────────────────────────────────────────

      # metrics 推送后重新同步，避免后续 push 冲突
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      # 9. Stats 卡片 - 透明主题（浅色模式）
      - name: Stats Card (Transparent)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=transparent&include_all_commits=true&hide_border=true"
          path: profile/stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 10. Stats 卡片 - Ocean Dark 主题（深色模式）
      - name: Stats Card (Ocean Dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=ocean_dark&include_all_commits=true&hide_border=true"
          path: profile/stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 11. Top Languages 卡片 - 透明主题（浅色模式）
      - name: Top Languages (Transparent)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&theme=transparent&hide_border=true&langs_count=8"
          path: profile/langs-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 12. Top Languages 卡片 - Ocean Dark 主题（深色模式）
      - name: Top Languages (Ocean Dark)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&theme=ocean_dark&hide_border=true&langs_count=8"
          path: profile/langs-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

     # 13. 统一提交 github-readme-stats 生成的 SVG
      - name: Commit Stats Cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash                          # 先把未暂存的 SVG 暂存起来
          git pull --rebase                  # 拉取 metrics 推送的新提交
          git stash pop                      # 还原 SVG 文件到工作区
          git add profile/*.svg
          git diff --cached --quiet && echo "No changes, skipping commit." || \
            git commit -m "chore: update github-readme-stats cards"
          git push
